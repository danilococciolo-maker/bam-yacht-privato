<script type="text/babel" data-presets="env,react">
const { useState, useRef, useCallback, useEffect } = React;

const STYLES = [
  { id: "modern", label: "Modern Luxury", prompt: "ultra-modern minimalist luxury yacht salon interior, panoramic glass windows on the sides showing open sea and bright sky horizon through transparent glazing, every window kept as clear glass with marine view visible, NO wall art NO mirrors NO paintings NO decorative panels NO marquetry inside window frames, pale white-oak wood floors, off-white painted walls between window frames, cream Italian leather sectional sofa, white Carrara marble coffee table with chamfered edges, brushed satin brass minimal hardware, recessed LED lighting, contemporary 2025 superyacht design, photorealistic professional architectural interior photography, magazine quality, ultra detailed 8k masterpiece, natural daylight through preserved windows" },
  { id: "scandi", label: "Scandinavian", prompt: "serene Scandinavian minimalist yacht salon interior, panoramic glass windows on the sides showing open sea and bright sky horizon through transparent glazing, every window kept as clear glass with marine view visible, NO wall art NO mirrors NO paintings NO decorative panels NO marquetry inside window frames, pale oak wood floors, off-white painted walls between window frames, ivory linen sofa with clean lines, light oak Nordic coffee table, organic wool throws, hand-thrown ceramic vases in muted earth tones, subtle brushed brass accents, contemporary Nordic yacht design, hygge atmosphere, photorealistic professional architectural interior photography, magazine quality, ultra detailed 8k masterpiece, soft natural daylight through preserved windows" },
  { id: "artdeco", label: "Art Deco", prompt: "Art Deco luxury yacht salon interior, panoramic glass windows on the sides showing open sea and bright sky horizon through transparent glazing, every window kept as clear glass with marine view visible, NO wall art NO mirrors NO paintings NO decorative panels NO marquetry inside window frames, dark walnut wood floors, deep navy painted walls between window frames, deep emerald green velvet upholstered tufted sofa with gold piping, black Calacatta marble coffee table with white veining and brass trim, polished brass fixtures, crystal chandelier, 1925 Manhattan glamour, photorealistic professional architectural interior photography, magazine quality, ultra detailed 8k masterpiece, warm dramatic lighting with daylight through preserved windows" },
  { id: "med", label: "Mediterraneo", prompt: "warm Mediterranean coastal yacht salon interior, panoramic glass windows on the sides showing open sea and bright sky horizon through transparent glazing, every window kept as clear glass with marine view visible, NO wall art NO mirrors NO paintings NO decorative panels NO marquetry inside window frames, light terracotta tiled floors, whitewashed walls between window frames, ivory handwoven linen and bouclé sofa with terracotta and deep navy cushions, rustic whitewashed wood coffee table, woven natural fiber rug, rattan accent chair, hand-thrown Sicilian ceramic vases, weathered driftwood elements, patinated aged brass nautical hardware, coastal villa elegance, photorealistic professional architectural interior photography, magazine quality, ultra detailed 8k masterpiece, warm golden hour Tuscan light through preserved windows" },
  { id: "dark", label: "Contemporary Dark", prompt: "ultra-contemporary dark luxury yacht salon interior, panoramic glass windows on the sides showing open sea and bright sky horizon through transparent glazing, every window kept as clear glass with marine view visible, NO wall art NO mirrors NO paintings NO decorative panels NO marquetry inside window frames, dark walnut wood floors, charcoal grey painted walls between window frames, dark grey nubuck leather sofa with bronze velvet cushions, black Calacatta Viola marble coffee table with bold white veining, hidden indirect LED cove lighting, bronze fixtures, masculine sophisticated automotive luxury vibe, photorealistic professional architectural interior photography, magazine quality, ultra detailed 8k masterpiece, dramatic moody contemporary lighting with daylight through preserved windows" },
];

const MODEL_ENDPOINT = "/v1/models/black-forest-labs/flux-canny-pro/predictions";
const UPSCALE_ENDPOINT = "/v1/models/philz1337x/clarity-upscaler/predictions";
const STEPS = ["Caricamento immagine\u2026", "Estrazione edge structure dalla foto\u2026", "Generazione concept refit con Flux Canny Pro\u2026", "Upscaling 4K UHD\u2026"];
const LOGO_SRC = window.__LOGO__;

function BAMYachtApp() {
  const [img, setImg] = useState(null);
  const [result, setResult] = useState(null);
  const [resultB64, setResultB64] = useState(null);
  const [style, setStyle] = useState(STYLES[0]);
  const [busy, setBusy] = useState(false);
  const [step, setStep] = useState(0);
  const [err, setErr] = useState(null);
  const [pos, setPos] = useState(50);
  const [drag, setDrag] = useState(false);
  const [pdfBusy, setPdfBusy] = useState(false);
  const [token, setToken] = useState("");
  const [showSettings, setShowSettings] = useState(false);
  const [tokenInput, setTokenInput] = useState("");
  const [imgAspect, setImgAspect] = useState("16/9");
  const [compareMode, setCompareMode] = useState(false);
  const [yacht, setYacht] = useState({ cantiere: "", modello: "", anno: "", oreMotore: "", manutenzione: "" });
  const updateYacht = (k, v) => setYacht(prev => Object.assign({}, prev, { [k]: v }));
  const fileRef = useRef();
  const sliderRef = useRef();
  const timer = useRef(null);

  useEffect(() => {
    try {
      const t = localStorage.getItem("bam_replicate_token");
      if (t) { setToken(t); setTokenInput(t); }
    } catch (_) {}
  }, []);

  const saveToken = () => {
    const t = (tokenInput || "").trim() || token;
    if (!t) { setErr("Inserisci il token Replicate"); return; }
    setToken(t);
    setShowSettings(false);
    setErr(null);
    try { localStorage.setItem("bam_replicate_token", t); } catch (_) {}
  };

  const clearToken = () => {
    setToken("");
    setTokenInput("");
    try { localStorage.removeItem("bam_replicate_token"); } catch (_) {}
  };

  const loadFile = useCallback((file) => {
    if (!file || !file.type || !file.type.startsWith("image/")) return;
    const r = new FileReader();
    r.onload = (e) => {
      const dataUrl = e.target.result;
      // Preprocess: load in canvas, resize if too big, convert to RGB JPEG
      const tmpImg = new Image();
      tmpImg.onload = () => {
        try {
          // Resize max 2048 in qualsiasi dim (Kontext Max accetta qualsiasi aspect ratio)
          const maxDim = 2048;
          let w = tmpImg.width, h = tmpImg.height;
          if (w > maxDim || h > maxDim) {
            const ratio = maxDim / Math.max(w, h);
            w = Math.round(w * ratio);
            h = Math.round(h * ratio);
          }
          const canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, w, h);
          ctx.drawImage(tmpImg, 0, 0, w, h);
          const clean = canvas.toDataURL("image/jpeg", 0.95);
          setImg(clean);
          setImgAspect(w + "/" + h);
        } catch (_) {
          setImg(dataUrl);
        }
        setResult(null);
        setResultB64(null);
        setErr(null);
      };
      tmpImg.onerror = () => {
        setImg(dataUrl);
        setResult(null);
        setResultB64(null);
        setErr(null);
      };
      tmpImg.src = dataUrl;
    };
    r.readAsDataURL(file);
  }, []);

  const urlToDataUri = async (url) => {
    const res = await fetch(url);
    const blob = await res.blob();
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(blob);
    });
  };

  // Croppa il render finale per matchare esattamente l'aspect ratio del prima
  const matchAspect = async (renderUrl, refDataUri) => {
    return new Promise((resolve) => {
      const refImg = new Image();
      refImg.onload = () => {
        const outImg = new Image();
        outImg.crossOrigin = "anonymous";
        outImg.onload = () => {
          try {
            const refRatio = refImg.width / refImg.height;
            const srcRatio = outImg.width / outImg.height;
            // Se aspect ratio già combaciano (tolleranza 2%), nessun crop
            if (Math.abs(refRatio - srcRatio) < 0.02) {
              resolve(renderUrl);
              return;
            }
            let cropW, cropH, cropX, cropY;
            if (srcRatio > refRatio) {
              cropH = outImg.height;
              cropW = outImg.height * refRatio;
              cropX = (outImg.width - cropW) / 2;
              cropY = 0;
            } else {
              cropW = outImg.width;
              cropH = outImg.width / refRatio;
              cropX = 0;
              cropY = (outImg.height - cropH) / 2;
            }
            const canvas = document.createElement("canvas");
            canvas.width = Math.round(cropW);
            canvas.height = Math.round(cropH);
            const ctx = canvas.getContext("2d");
            ctx.drawImage(outImg, cropX, cropY, cropW, cropH, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL("image/jpeg", 0.95));
          } catch (_) {
            resolve(renderUrl);
          }
        };
        outImg.onerror = () => resolve(renderUrl);
        outImg.src = renderUrl;
      };
      refImg.onerror = () => resolve(renderUrl);
      refImg.src = refDataUri;
    });
  };

  const generate = async () => {
    if (!img || busy) return;
    if (!token) { setShowSettings(true); return; }

    setBusy(true); setResult(null); setResultB64(null); setErr(null); setStep(0);

    try {
      let sceneDescription = "";

      // Compongo prompt finale: prima la descrizione architettonica (vincolo critico), poi lo stile
      const promptText = "Photorealistic refit of the input yacht interior. CRITICAL ARCHITECTURAL CONSTRAINT: every rectangular opening on the sides and front is a WINDOW with VIEW OF OCEAN AND SKY (not a panel, not wall art, not a mirror, not a painting). Keep all windows as TRANSPARENT GLASS with bright sea horizon, sky and natural daylight visible through them - identical to input. Only repaint walls between windows, floor, ceiling, furniture and decor. Style for materials and decor: " + style.prompt;

      // STEP 2: Flux Canny Pro \u2014 edge detection + style transfer
      setStep(1);
      const startRes = await fetch(MODEL_ENDPOINT, {
        method: "POST",
        headers: { "Authorization": "Token " + token, "Content-Type": "application/json" },
        body: JSON.stringify({
          input: {
            control_image: img,
            prompt: promptText,
            steps: 50,
            guidance: 11,
            safety_tolerance: 5,
            output_format: "jpg",
            output_quality: 95,
            prompt_upsampling: false,
          }
        })
      });

      if (startRes.status === 401) throw new Error("Token Replicate non valido. Verificalo in Impostazioni.");
      if (startRes.status === 402) throw new Error("Credito Replicate esaurito.");
      if (startRes.status === 429) throw new Error("Troppe richieste. Attendi qualche secondo.");
      if (!startRes.ok) {
        const txt = await startRes.text();
        throw new Error("Errore Replicate " + startRes.status + ": " + txt.slice(0, 200));
      }

      let prediction = await startRes.json();
      let attempts = 0;
      setStep(2);
      while ((prediction.status === "starting" || prediction.status === "processing") && attempts < 90) {
        await new Promise(r => setTimeout(r, 2000));
        const pollPath = new URL(prediction.urls.get).pathname;
        const pollRes = await fetch(pollPath, {
          headers: { "Authorization": "Token " + token }
        });
        if (!pollRes.ok) throw new Error("Errore nel monitoraggio del render");
        prediction = await pollRes.json();
        attempts++;
      }

      if (prediction.status === "failed") throw new Error("Render fallito: " + (prediction.error || "errore sconosciuto"));
      if (prediction.status === "canceled") throw new Error("Render annullato");
      if (prediction.status !== "succeeded") throw new Error("Timeout del render. Riprova.");

      const baseOutputUrl = Array.isArray(prediction.output) ? prediction.output[0] : prediction.output;
      if (!baseOutputUrl) throw new Error("Nessun output dal modello");

      // STEP 3: Upscale 4x con clarity-upscaler per output 4K UHD
      setStep(3);
      try {
        const upRes = await fetch(UPSCALE_ENDPOINT, {
          method: "POST",
          headers: { "Authorization": "Token " + token, "Content-Type": "application/json" },
          body: JSON.stringify({
            input: {
              image: baseOutputUrl,
              scale_factor: 4,
              dynamic: 6,
              creativity: 0.4,
              resemblance: 0.7,
              num_inference_steps: 30,
            }
          })
        });

        if (!upRes.ok) {
          // Fallback: usa output base senza upscale
          const matched = await matchAspect(baseOutputUrl, img);
          setResult(matched);
          urlToDataUri(matched).then(setResultB64).catch(() => {});
          return;
        }

        let upscale = await upRes.json();
        let upAttempts = 0;
        while ((upscale.status === "starting" || upscale.status === "processing") && upAttempts < 150) {
          await new Promise(r => setTimeout(r, 2000));
          const upPollPath = new URL(upscale.urls.get).pathname;
          const upPollRes = await fetch(upPollPath, {
            headers: { "Authorization": "Token " + token }
          });
          if (!upPollRes.ok) break;
          upscale = await upPollRes.json();
          upAttempts++;
        }

        const rawUrl = upscale.status === "succeeded"
          ? (Array.isArray(upscale.output) ? upscale.output[0] : upscale.output)
          : baseOutputUrl;

        // Match aspect ratio del prima (rimuove banda nera)
        const finalUrl = await matchAspect(rawUrl, img);

        setResult(finalUrl);
        urlToDataUri(finalUrl).then(setResultB64).catch(() => {});
      } catch (_) {
        const matched = await matchAspect(baseOutputUrl, img);
        setResult(matched);
        urlToDataUri(matched).then(setResultB64).catch(() => {});
      }

    } catch (e) {
      setErr(e.message || "Errore imprevisto");
    } finally {
      setBusy(false);
    }
  };

  const downloadPDF = async () => {
    if (!window.jspdf || !img || !result) return;
    setPdfBusy(true);
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
      const W = 297, H = 210;

      const aspectParts = imgAspect.split("/");
      const aw = parseFloat(aspectParts[0]) || 16;
      const ah = parseFloat(aspectParts[1]) || 9;
      const ratio = aw / ah;
      const fitImage = (maxW, maxH) => {
        const widthFirst = maxW / ratio;
        if (widthFirst <= maxH) return { w: maxW, h: widthFirst };
        return { w: maxH * ratio, h: maxH };
      };
      const date = new Date().toLocaleDateString("it-IT", { day: "2-digit", month: "long", year: "numeric" });

      const drawPageHeader = (subtitle) => {
        doc.setFillColor(8, 12, 24);
        doc.rect(0, 0, W, H, "F");
        // Logo BAM disegnato direttamente in PDF (rect + testo, no immagine)
        doc.setFillColor(8, 12, 24);
        doc.rect(12, 5, 32, 12, "F");
        doc.setTextColor(232, 220, 200);
        doc.setFontSize(11);
        doc.setFont(undefined, "normal");
        doc.text("BAM", 28, 12, { align: "center" });
        doc.setFontSize(4);
        doc.setTextColor(201, 168, 76);
        doc.text("GROUP", 28, 15.5, { align: "center" });
        doc.setFontSize(7);
        doc.setTextColor(201, 168, 76);
        doc.text("YACHT \u00B7 AI REFIT STUDIO", 50, 10);
        doc.setFontSize(11);
        doc.setTextColor(232, 220, 200);
        doc.text(subtitle, 50, 16);
        doc.setFontSize(8);
        doc.setTextColor(201, 168, 76);
        doc.text(style.label.toUpperCase(), W - 12, 10, { align: "right" });
        doc.setTextColor(180, 170, 140);
        doc.text(date, W - 12, 16, { align: "right" });
        doc.setDrawColor(201, 168, 76);
        doc.setLineWidth(0.2);
        doc.line(12, 21, W - 12, 21);
      };

      const hasYacht = !!(yacht.cantiere || yacht.modello || yacht.anno || yacht.oreMotore || yacht.manutenzione);

      // ============ PAGINA UNICA: CONFRONTO PRIMA / DOPO + SCHEDA BARCA SOTTO ============
      drawPageHeader("Confronto e Scheda Tecnica");

      const photoAreaTop = 27;
      const photoAreaBottom = hasYacht ? 138 : 192;
      const gap = 5;
      const padX = 10;
      const p2MaxW = (W - padX * 2 - gap) / 2;
      const p2MaxH = photoAreaBottom - photoAreaTop;
      const p2Img = fitImage(p2MaxW, p2MaxH);

      const leftX = padX + (p2MaxW - p2Img.w) / 2;
      const p2Y = photoAreaTop + (p2MaxH - p2Img.h) / 2;
