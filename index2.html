<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a2540">
<title>BAM Vision — AI Refit Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Crimson Text',Georgia,serif;background:#1a2540;color:#e8dcc8;min-height:100vh}
.pill{background:transparent;border:1px solid rgba(201,168,76,.18);color:rgba(232,220,200,.5);padding:7px 18px;font-family:'Crimson Text',serif;font-size:14px;letter-spacing:.05em;cursor:pointer;border-radius:2px;transition:all .25s}
.pill:hover{border-color:rgba(201,168,76,.45);color:rgba(201,168,76,.85)}
.pill.on{background:rgba(201,168,76,.1);border-color:#c9a84c;color:#c9a84c}
.dz{border:1px dashed rgba(201,168,76,.22);border-radius:3px;padding:56px 32px;text-align:center;cursor:pointer;transition:all .3s;background:rgba(255,255,255,.012)}
.dz:hover,.dz.ov{border-color:rgba(201,168,76,.55);background:rgba(201,168,76,.035)}
.gbtn{background:linear-gradient(135deg,#c9a84c,#a8843a);color:#060a14;border:none;padding:15px 56px;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .3s}
.gbtn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 40px rgba(201,168,76,.32);filter:brightness(1.08)}
.gbtn:disabled{opacity:.35;cursor:not-allowed}
.pbtn{background:transparent;border:1px solid #c9a84c;color:#c9a84c;padding:10px 26px;font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .25s;font-weight:600}
.pbtn:hover:not(:disabled){background:rgba(201,168,76,.1)}
.pbtn:disabled{opacity:.4;cursor:not-allowed}
.olink{display:inline-flex;align-items:center;border:1px solid rgba(201,168,76,.28);color:rgba(201,168,76,.78);padding:10px 26px;font-size:13px;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;border-radius:2px;transition:all .25s}
.olink:hover{background:rgba(201,168,76,.07);border-color:#c9a84c;color:#c9a84c}
.sbtn{background:transparent;border:1px solid rgba(201,168,76,.13);color:rgba(232,220,200,.32);padding:10px 26px;font-size:13px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:color .25s}
.sbtn:hover{color:rgba(232,220,200,.58)}
@keyframes glow{0%,100%{opacity:.62}50%{opacity:1;text-shadow:0 0 22px rgba(201,168,76,.55)}}
.ltxt{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:#c9a84c;letter-spacing:.08em;animation:glow 2.5s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{width:44px;height:44px;border:1.5px solid rgba(201,168,76,.1);border-top-color:#c9a84c;border-right-color:rgba(201,168,76,.4);border-radius:50%;animation:spin 1.1s linear infinite;margin:0 auto}
@keyframes fu{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.rv{animation:fu .65s ease forwards}
.div{height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.1),transparent);margin:38px 0}
.sn{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.28em;color:rgba(201,168,76,.4);text-transform:uppercase;margin-bottom:3px}
.sl{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.18em;color:rgba(201,168,76,.82);text-transform:uppercase;margin-bottom:14px}
.gear{flex:0 0 auto;background:transparent;border:1px solid rgba(201,168,76,.18);color:rgba(201,168,76,.6);width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .25s}
.gear:hover{border-color:#c9a84c;color:#c9a84c}
.gear.ok{border-color:rgba(80,200,120,.5);color:rgba(80,200,120,.85)}
.hdr-left{display:flex;align-items:center;gap:8px;justify-self:start;min-width:0;overflow:hidden}
.hdr-right{display:flex;align-items:center;justify-self:end;min-width:0}
.navbtn{flex:0 0 auto;background:transparent;border:1px solid rgba(201,168,76,.18);color:rgba(201,168,76,.62);height:34px;padding:0 16px;border-radius:18px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase;display:flex;align-items:center;gap:7px;white-space:nowrap}
.navbtn.adm{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.32);color:#c9a84c}
.navbtn .ic{font-size:14px;line-height:1}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;animation:fu .25s}
.modal{background:linear-gradient(180deg,#1c2c4a,#1a2540);border:1px solid rgba(201,168,76,.18);border-radius:4px;max-width:500px;width:100%;padding:36px}
.inp{width:100%;background:rgba(0,0,0,.35);border:1px solid rgba(201,168,76,.18);color:#e8dcc8;padding:11px 14px;font-family:'Crimson Text',serif;font-size:14px;border-radius:2px;letter-spacing:.02em}
.inp:focus{outline:none;border-color:#c9a84c}
header{border-bottom:1px solid rgba(201,168,76,.09);padding:14px 18px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;background:rgba(26,37,64,.93);backdrop-filter:blur(18px);position:sticky;top:0;z-index:200}
header svg{height:64px;width:auto;display:block}
header>img{justify-self:center}
.badge{font-family:'Cormorant Garamond',serif;font-size:10px;color:rgba(201,168,76,.3);letter-spacing:.28em;text-transform:uppercase;border:1px solid rgba(201,168,76,.12);padding:3px 12px;border-radius:2px;white-space:nowrap}
@media (max-width:600px){header svg{height:40px}header>img{height:40px!important}header{padding:11px 12px;gap:6px}.navbtn{padding:0 11px;letter-spacing:0;gap:0}.navlbl{display:none}.badge{display:none}main{padding:32px 16px 60px}}
main{max-width:840px;margin:0 auto;padding:48px 20px 80px;background:radial-gradient(ellipse 110% 55% at 50% 0%,rgba(201,168,76,.1) 0%,transparent 60%),linear-gradient(180deg,#1a2540,#202d4a)}
footer{border-top:1px solid rgba(201,168,76,.07);padding:24px 20px;text-align:center;font-size:10px;color:rgba(232,220,200,.12);letter-spacing:.2em;text-transform:uppercase;font-family:'Cormorant Garamond',serif}
</style>

async function replicateCreate(endpoint, token, payload) {
  // Replicate puo rispondere 429 (troppe richieste insieme) o 503/502 (sovraccarico
  // momentaneo), soprattutto quando partono molte chiamate in parallelo. In quel caso
  // NON ci arrendiamo: aspettiamo un attimo e riproviamo, rispettando l'eventuale
  // header Retry-After. Cosi la segmentazione e tutte le proposte vanno comunque a buon fine.
  const MAX_RETRIES = 6;
  let delay = 800;
  for (let attempt = 0; ; attempt++) {
    const res = await fetch(endpoint, {
      method: "POST",
      headers: { "Authorization": "Token " + token, "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    if (res.status === 401) throw new Error("Token Replicate non valido. Verificalo in Impostazioni.");
    if (res.status === 402) throw new Error("Credito Replicate esaurito.");
    if ((res.status === 429 || res.status === 503 || res.status === 502) && attempt < MAX_RETRIES) {
      const ra = parseFloat(res.headers.get("retry-after"));
      const wait = (!isNaN(ra) && ra > 0) ? Math.min(ra * 1000, 8000) : delay;
      await new Promise(r => setTimeout(r, wait));
      delay = Math.min(Math.round(delay * 1.7), 8000);
      continue;
    }
    if (res.status === 429) throw new Error("Troppe richieste. Attendi qualche secondo.");
    if (!res.ok) { const txt = await res.text(); throw new Error("Errore Replicate " + res.status + ": " + txt.slice(0, 220)); }
    return res.json();
  }
}

async function replicatePoll(prediction, token, maxAttempts, shouldStop) {
  let attempts = 0;
  while ((prediction.status === "starting" || prediction.status === "processing") && attempts < maxAttempts) {
    if (typeof shouldStop === "function" && shouldStop()) { const _e = new Error("Interrotto"); _e.stopped = true; throw _e; }
    await new Promise(r => setTimeout(r, 2000));
    const pollPath = new URL(prediction.urls.get).pathname;
    const pollRes = await fetch(pollPath, { headers: { "Authorization": "Token " + token } });
    if (!pollRes.ok) {
      // Errori transitori durante il polling (429/503/5xx): non fallisco, aspetto e riprovo.
      if (pollRes.status === 401 || pollRes.status === 402) throw new Error("Accesso Replicate non valido durante il monitoraggio.");
      attempts++;
      continue;
    }
    prediction = await pollRes.json();
    attempts++;
  }
  if (prediction.status === "failed") throw new Error("Elaborazione fallita: " + (prediction.error || "errore sconosciuto"));
  if (prediction.status === "canceled") throw new Error("Elaborazione annullata");
  if (prediction.status !== "succeeded") throw new Error("Timeout dell'elaborazione. Riprova.");

// Costruisce la maschera per Flux Fill: BIANCO = interno da rifare, NERO = finestre da preservare.
// Parte dalla maschera-finestre di grounded_sam (bianco = finestre) e la inverte.
function buildInpaintMask(maskUrl, refDataUri) {
  return new Promise((resolve, reject) => {
    const ref = new Image();
    ref.onload = () => {
      const m = new Image();
      m.crossOrigin = "anonymous";
      m.onload = () => {
        try {
          const w = ref.naturalWidth || ref.width;
          const h = ref.naturalHeight || ref.height;
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(m, 0, 0, w, h);
          const imgData = ctx.getImageData(0, 0, w, h);
          const d = imgData.data;
          for (let i = 0; i < d.length; i += 4) {
            const lum = (d[i] + d[i + 1] + d[i + 2]) / 3;
            const v = lum > 110 ? 0 : 255; // finestre (chiare nella maschera) -> nere; resto -> bianco
            d[i] = d[i + 1] = d[i + 2] = v; d[i + 3] = 255;
          }
          ctx.putImageData(imgData, 0, 0);
          resolve(canvas.toDataURL("image/png"));
        } catch (e) { reject(e); }
      };
      m.onerror = () => reject(new Error("maschera non caricata"));
      m.src = maskUrl;
    };
    ref.onerror = () => reject(new Error("immagine di riferimento non caricata"));
    ref.src = refDataUri;
  });
}

                if (exterior && !warm) { a = 255; locked++; }
              }
              mp[i] = 255; mp[i + 1] = 255; mp[i + 2] = 255; mp[i + 3] = a;
            }
            // se non c'e' vera vista esterna da preservare, lascio il render cosi com'e'
            if (locked < (w * h) * 0.0008) { resolve(renderUrl); return; }
            mctx.putImageData(md, 0, 0);
            // layer finestre dall'originale, ritagliato sulla sola vista esterna
            const win = document.createElement("canvas");
            win.width = w; win.height = h;
            const wctx = win.getContext("2d");
            wctx.drawImage(ref, 0, 0, w, h);
            wctx.globalCompositeOperation = "destination-in";
            wctx.drawImage(ma, 0, 0);
            // sovrappongo la vista esterna originale sul render
            octx.drawImage(win, 0, 0);
            resolve(out.toDataURL("image/jpeg", 0.95));
          } catch (e) { resolve(renderUrl); }
        };
        mask.onerror = () => resolve(renderUrl);
        mask.src = maskUrl;
      };
      render.onerror = () => resolve(renderUrl);
      render.src = renderUrl;
    };
    ref.onerror = () => resolve(renderUrl);
    ref.src = refDataUri;
  });
}

// Giudice AI: dà un voto 0-100 a una proposta. Best effort: in caso di errore torna 50.
async function judgeVariant(variantUrl, userRequest, removeList, keepList, token) {
  const hasRemoval = Array.isArray(removeList) && removeList.length > 0;
  const hasKeep = Array.isArray(keepList) && keepList.length > 0;
  const checkMode = hasRemoval || hasKeep;
  try {
    let jp;
    if (checkMode) {
      jp = "You are a strict art director checking an AI yacht-interior refit render against the broker's request: \"" + userRequest + "\". "
        + (hasRemoval ? "The broker explicitly asked to REMOVE these item(s): " + removeList.join("; ") + ". Check carefully whether each is now completely ABSENT. " : "")
        + (hasKeep ? "The broker explicitly asked to KEEP these pieces present and in place: " + keepList.join("; ") + ". Check carefully whether each is still present. " : "")
        + "Then also judge realism, absence of artifacts or deformed furniture, believable yacht architecture, and that the room is still fully furnished and on-brief. If the broker asked for a lighter scheme or to remove dark wood, heavily penalise any variant that still shows noticeable patches of the original dark or warm-orange wood (panelling, trim, door or window frames, ceiling border). Reply with ONLY a compact JSON object and nothing else, in this exact form: {\"removed_absent\": true or false, \"kept_present\": true or false, \"score\": integer 0-100}. removed_absent is true ONLY if every item to remove is genuinely gone (use true if there was nothing to remove). kept_present is true ONLY if every piece to keep is still there (use true if there was nothing to keep).";
    } else {
      jp = "You are a strict art director reviewing an AI yacht-interior refit render. The broker asked for: \"" + userRequest + "\". Score THIS image from 0 to 100, weighing whether it carried out the broker's explicit instructions, realism, absence of artifacts or deformed furniture, believable yacht architecture, and that the room is still fully furnished. If the broker asked for a lighter scheme or to remove dark wood, heavily penalise the score if the image still shows noticeable patches of the original dark or warm-orange wood (panelling, trim, door or window frames, ceiling border). Reply with ONLY one integer between 0 and 100, nothing else.";
    }
    let pred = await replicateCreate(JUDGE_ENDPOINT, token, { input: { prompt: jp, image_input: [variantUrl] } });
    pred = await replicatePoll(pred, token, 40);
    let out = pred.output;
    if (Array.isArray(out)) out = out.join(" ");
    out = String(out == null ? "" : out);
    if (checkMode) {
      let removedAbsent = !hasRemoval;
      let keptPresent = !hasKeep;
      let score = 50;
      try {
        const s = out.indexOf("{"), e = out.lastIndexOf("}");
        if (s !== -1 && e !== -1 && e > s) {
          const j = JSON.parse(out.slice(s, e + 1));
          if (hasRemoval) removedAbsent = j.removed_absent === true || String(j.removed_absent).toLowerCase() === "true";
          if (hasKeep) keptPresent = j.kept_present === true || String(j.kept_present).toLowerCase() === "true";
          const sc = parseInt(j.score, 10);
          if (!isNaN(sc)) score = Math.min(100, sc);
        }
      } catch (_) {
        const m = out.match(/\d{1,3}/);
        if (m) score = Math.min(100, parseInt(m[0], 10));
      }
      // obbedienza piena = ha tolto cio che andava tolto E tenuto cio che andava tenuto
      const removalOk = removedAbsent && keptPresent;
      if (!removalOk) score = Math.min(score, 15);
      return { score: score, removalOk: removalOk };
    }
    const m = out.match(/\d{1,3}/);
    return { score: m ? Math.min(100, parseInt(m[0], 10)) : 50, removalOk: true };
  } catch (_) { return { score: 50, removalOk: !checkMode }; }
}

// Porta un'immagine ad almeno 1920px sul lato lungo (canvas) e restituisce un data URL JPEG,
// cosi Veo genera la clip ad alta risoluzione (1080p) e Topaz la porta a 4K vero.
// Qualsiasi errore (CORS, decodifica) -> ritorna l'URL originale: nessuna regressione.
function loadImageEl(src, useCross) {
  return new Promise(function (resolve, reject) {
    var im = new Image();
    if (useCross) im.crossOrigin = "anonymous";
    im.onload = function () { resolve(im); };
    im.onerror = function () { reject(new Error("img")); };
    im.src = src;
  });
}
function coverTo1080(im) {
  var W = 1920, H = 1080; // formato video fisso 16:9
  var w = im.naturalWidth || im.width, h = im.naturalHeight || im.height;
  if (!w || !h) throw new Error("dim");
  // COVER: riempie tutto il 16:9 ritagliando l'eccesso, centrato. Mai barre nere.
  var scale = Math.max(W / w, H / h);
  var dw = w * scale, dh = h * scale, dx = (W - dw) / 2, dy = (H - dh) / 2;
  var cv = document.createElement("canvas");
  cv.width = W; cv.height = H;
  var ctx = cv.getContext("2d");
  ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = "high";
  ctx.drawImage(im, dx, dy, dw, dh);
  return cv.toDataURL("image/jpeg", 0.95);
}
async function ensureHiResForVeo(imageUrl) {
  // 1) Via piu robusta: scarico come blob -> object URL (same-origin: il canvas non si blocca mai).
  try {
    const resp = await fetch(imageUrl);
    if (resp && resp.ok) {
      const blob = await resp.blob();
      const obj = URL.createObjectURL(blob);
      try { const im = await loadImageEl(obj, false); const out = coverTo1080(im); URL.revokeObjectURL(obj); return out; }
      catch (e) { URL.revokeObjectURL(obj); }
    }
  } catch (_) {}
  // 2) Fallback: Image con crossOrigin.
  try { const im = await loadImageEl(imageUrl, true); return coverTo1080(im); } catch (_) {}
  // 3) Ultimissimo fallback (raro): immagine originale, per non perdere la clip.
  return imageUrl;
}

// Estrae in modo ROBUSTO un URL https dall'output di una predizione Replicate,
// che puo' essere una stringa, un array, oppure un oggetto ({video:...},{url:...}, ecc.).
// Se non trova un URL https valido restituisce null: cosi la clip viene scartata e
// MAI salvata con un URL finto tipo "[object Object]" (la causa dei 400 su save-video).
function firstUrl(out) {
  if (typeof out === "string") return /^https:\/\//.test(out) ? out : null;
  if (Array.isArray(out)) { for (let i = 0; i < out.length; i++) { const u = firstUrl(out[i]); if (u) return u; } return null; }
  if (out && typeof out === "object") {
    const keys = ["video", "url", "output", "file", "mp4", "uri", "video_url"];
    for (let i = 0; i < keys.length; i++) { const u = firstUrl(out[keys[i]]); if (u) return u; }
    for (const k in out) { const u = firstUrl(out[k]); if (u) return u; }
    return null;
  }
  return null;
}

// Genera UNA clip Veo da una foto (URL firmato, fetchato lato Replicate).
async function veoClip(imageUrl, token, shouldStop, endpoint) {
  let pred = await replicateCreate(endpoint || VEO_ENDPOINT, token, { input: { prompt: PROMPT_VEO_MOVE, image: imageUrl, duration: 8, resolution: "1080p" } });
  pred = await replicatePoll(pred, token, 180, shouldStop);
  const u = firstUrl(pred.output);
  if (!u) {
    // DIAGNOSTICA TEMPORANEA: l'output non conteneva un URL https -> mando la sua forma al server per i log.
    try {
      const o = pred.output;
      const shape = (o === null || o === undefined) ? String(o) : (Array.isArray(o) ? ("array[" + o.length + "]") : typeof o);
      const keys = (o && typeof o === "object" && !Array.isArray(o)) ? Object.keys(o).slice(0, 15) : null;
      fetch(SAVE_VIDEO_ENDPOINT, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ diag: "veo-output", shape: shape, keys: keys, sample: JSON.stringify(o).slice(0, 400) }) });
    } catch (_) {}
  }
  return u;
}

// Giudica UNA clip con Gemini: video + immagine di riferimento -> {move,fid}.
async function judgeVideo(videoUrl, refImageUrl, token) {
  try {
    let pred = await replicateCreate(JUDGE_ENDPOINT, token, { input: { prompt: VIDEO_JUDGE_PROMPT, image_input: [videoUrl, refImageUrl] } });
    pred = await replicatePoll(pred, token, 60);
    let out = pred.output;
    if (Array.isArray(out)) out = out.join(" ");
    out = String(out == null ? "" : out);
    let move = null, fid = null;
    const s = out.indexOf("{"), e = out.lastIndexOf("}");
    if (s !== -1 && e !== -1 && e > s) {
      const j = JSON.parse(out.slice(s, e + 1));
      const m = parseInt(j.move_score, 10); if (!isNaN(m)) move = Math.max(0, Math.min(100, m));
      const fp = parseInt(j.fidelity, 10); if (!isNaN(fp)) fid = Math.max(0, Math.min(100, fp));
    }
    return { move: move, fid: fid };
  } catch (_) { return { move: null, fid: null }; }
}

// Genera VIDEO_N_SAMPLES versioni per UNA foto, le giudica, ritorna la migliore.
async function makeRoomVideo(item, token, onLog, shouldStop) {
  const src0 = item.url || item.after_signed;
  const name = item.label || "Foto";
  if (!src0) throw new Error(name + ": manca l'immagine.");
  // Foto sorgente ad almeno 1920px -> clip Veo a 1080p -> Topaz 4K vero. Fallback: originale.
  const src = await ensureHiResForVeo(src0);
  const stopped = function () { return typeof shouldStop === "function" && shouldStop(); };
  async function roundGen(endpoint, n) {
    const gens = await Promise.all(Array.from({ length: n }, function () {
      return veoClip(src, token, shouldStop, endpoint).catch(function () { return null; });
    }));
    return gens.filter(Boolean);
  }
  // ROBUSTEZZA: piu tentativi su piu modelli prima di arrendersi, cosi una foto non si perde mai.
  onLog(name + ": genero " + VIDEO_N_SAMPLES + " in corso\u2026");
  let good = await roundGen(VEO_ENDPOINT, VIDEO_N_SAMPLES);
  if (!good.length && !stopped()) {
    onLog(name + ": riprovo\u2026");
    await new Promise(function (r) { setTimeout(r, 3000); });
    good = await roundGen(VEO_ENDPOINT, VIDEO_N_SAMPLES);
  }
  if (!good.length && !stopped()) {
    onLog(name + ": ultima risorsa, qualit\u00E0 massima\u2026");
    await new Promise(function (r) { setTimeout(r, 3000); });
    good = await roundGen(VEO_ENDPOINT_STD, 1);
  }
  if (!good.length) throw new Error(name + ": nessuna versione generata.");
  onLog(name + ": " + good.length + "/" + VIDEO_N_SAMPLES + " versioni pronte. Controllo AI (movimento + fedelt\u00E0)\u2026");
  const judged = [];
  for (let i = 0; i < good.length; i++) {
    const j = await judgeVideo(good[i], src, token);
    const rank = (j.move != null && j.fid != null) ? Math.min(j.move, j.fid)
               : (j.move != null ? j.move : (j.fid != null ? j.fid : -1));
    judged.push({ url: good[i], move: j.move, fid: j.fid, rank: rank });
    onLog("   versione " + (i + 1) + ": " + (j.move != null ? "movimento " + j.move : "movimento n/d") + ", " + (j.fid != null ? "fedelt\u00E0 " + j.fid : "fedelt\u00E0 non verif."));
  }
  judged.sort(function (a, b) { return b.rank - a.rank; });
  const best = judged[0];
  onLog("\u2713 " + name + ": mostro la versione migliore" + (good.length > 1 ? ", scartate " + (good.length - 1) : "") + ".");
  return { label: name, url: best.url, move: best.move, fid: best.fid, room_id: item.room_id || null, kind: item.kind || null };
}

// Risolve la versione di un modello community.
async function modelVersion(endpoint, token) {
  const r = await fetch(endpoint, { headers: { "Authorization": "Token " + token } });
  if (!r.ok) throw new Error("Modello non raggiungibile (" + r.status + ").");
  const m = await r.json();
  const v = m && m.latest_version && m.latest_version.id;
  if (!v) throw new Error("Versione del modello non trovata.");
  return v;
}

// Sovrappone UNA traccia musicale su tutta la durata del video.
async function addMusic(videoUrl, musicUrl, token) {
  const ver = await modelVersion(MUSIC_MERGE_MODEL_ENDPOINT, token);
  let pred = await replicateCreate(PREDICTIONS_ENDPOINT, token, { version: ver, input: { video_file: videoUrl, audio_file: musicUrl, replace_audio: true, duration_mode: "video", audio_volume: 0.85 } });
  pred = await replicatePoll(pred, token, 150);
  return firstUrl(pred.output);
}

// Upscale AI fino a 4K con Topaz (modello ufficiale, temporal-aware: niente sfarfallio).
async function topazUpscale(videoUrl, token) {
  let pred = await replicateCreate(TOPAZ_VIDEO_ENDPOINT, token, { input: { video: videoUrl, upscale_factor: "2x" } });
  pred = await replicatePoll(pred, token, 300);
  return firstUrl(pred.output);
}

// Unisce piu' clip in UN solo mp4 e applica una musica unica su tutta la durata.
async function mergeClips(urls, token) {
  const ver = await modelVersion(MERGE_MODEL_ENDPOINT, token);
  // 1) unisci le clip SENZA l'audio spezzettato
  let pred = await replicateCreate(PREDICTIONS_ENDPOINT, token, { version: ver, input: { video_files: urls, keep_audio: false } });
  pred = await replicatePoll(pred, token, 150);
  const merged = firstUrl(pred.output);
  if (!merged) return null;
  // 2) musica unica su tutto (best-effort: se fallisce resta comunque il video unito)
  try {
    const withMusic = await addMusic(merged, MUSIC_URL, token);
    if (withMusic) return withMusic;
  } catch (_) {}
  return merged;
}

  async function crossfadeMerge(urls) {
    const s = await supabaseClient.auth.getSession();
    const sess = s && s.data ? s.data.session : null;
    const jwt = sess ? sess.access_token : null;
    const uid = sess && sess.user ? sess.user.id : null;
    if (!jwt || !uid || !urls || urls.length < 2) return null;
    const path = uid + "/" + Date.now() + "_dissolve.mp4";

    // Firma il file finale se gia' presente su Supabase, altrimenti null.
    async function trySign() {
      try {
        const sg = await supabaseClient.storage.from(VIDEO_BUCKET).createSignedUrl(path, 3600);
        return sg && sg.data && sg.data.signedUrl ? sg.data.signedUrl : null;
      } catch (_) { return null; }
    }

    // Lancia il crossfade sul server. Su mobile la richiesta lunga (~20-30s) puo' cadere
    // mentre il server continua a lavorare e carica il file finale: per questo NON ci
    // affidiamo alla risposta della fetch, ma verifichiamo la comparsa del file su Supabase.
    let httpErr = false;
    try {
      const r = await fetch(CROSSFADE_ENDPOINT, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ urls: urls, jwt: jwt, path: path }) });
      if (!r || !r.ok) httpErr = true;
    } catch (_) { /* connessione caduta: il server puo' aver finito comunque */ }

    // Errore HTTP esplicito (4xx/5xx): il server non produrra' il file -> ripiego.
    if (httpErr) return null;

    // Attendi la comparsa del file finale (server maxDuration ~60s). Poll ogni 3s fino a ~80s.
    let signed = await trySign();
    if (!signed) {
      const deadline = Date.now() + 310000;
      while (!signed && Date.now() < deadline) {
        await new Promise(function (res) { setTimeout(res, 3000); });
        signed = await trySign();
      }
    }
    if (!signed) return null;

    try { await supabaseClient.from("dossier_videos").insert({ broker_id: uid, label: "Video unico", kind: "merged", is_merged: true, storage_path: path, source_count: urls.length, model: "crossfade-ffmpeg" }); } catch (_) {}
    return signed;
  }

  // Unione: prova la dissolvenza (ffmpeg, gia' salva su Supabase); se non parte,
  // ripiega sull'unione + musica via Replicate (stacco netto) e poi salva.
  async function runMerge(urls) {
    // 1) dissolvenza + musica + togli-bande (gia' salvato su Supabase)
    let assembled = null;
    try { const cf = await crossfadeMerge(urls); if (cf) assembled = cf; } catch (_) {}

        } catch (_) {}
        if (!assembled) assembled = url;
      }
    }
    if (!assembled) return null;
    // Niente upscale Topaz: il video unito 2.5K con musica, dissolvenza e watermark e' gia' il file finale
    // (Topaz toglieva l'audio e raddoppiava i tempi).
    return assembled;
  }

  async function createVideos(items) {
    if (!token) { setVideoErr("Manca il token Replicate. Aprilo in Impostazioni."); return; }
    if (!items || !items.length) return;
    setVideoErr(null); setVideoBusy(true); setVideoLog([]); setVideoIdx(0); setMergedUrl(null); setMergeErr(null); setVideoProg({ done: 0, total: items.length, name: "" });
    videoStopRef.current = false; setVideoStopReq(false);
    const prior = (loadVideoJob() || {}).done || [];
    const priorByKey = {}; prior.forEach(function (c) { if (c && c.key) priorByKey[c.key] = c; });
    const logArr = [];
    const push = function (s) { logArr.push(s); setVideoLog(logArr.slice()); };
    const meta = items.map(function (x) { return { key: x.key, label: x.label }; });
    const done = [];
    const failed = [];
    setVideoClips([]);
    saveVideoJob({ ts: Date.now(), items: meta, done: [], merged: null });
    try {
      let uid = null;
      try { const au = await supabaseClient.auth.getUser(); uid = au && au.data && au.data.user ? au.data.user.id : null; } catch (_) {}
      // Genero le stanze a piccoli gruppi IN PARALLELO (i campioni di ogni stanza sono
      // gia' paralleli). Il risultato di ogni clip e' identico: cambia solo che piu' stanze
      // partono insieme. mapStaggered sfalsa le partenze e replicateCreate ritenta sui 429.
      const VIDEO_BATCH = 2; // stanze in parallelo per gruppo (2 = fino a 4 generazioni Veo insieme, evita i 429 di Veo)
      async function processRoom(i) {
        if (videoStopRef.current) return { stop: true };
        if (items[i].key && priorByKey[items[i].key]) {
          return { clip: priorByKey[items[i].key], reused: true };
        }
        let made = null;
        for (let attempt = 0; attempt < 2 && !made && !videoStopRef.current; attempt++) {
          try { made = await makeRoomVideo(items[i], token, push, function () { return videoStopRef.current; }); }
          catch (errRoom) { if (attempt === 0 && !videoStopRef.current) push("\u21BB " + (items[i].label || ("Ambiente " + (i + 1))) + ": riprovo una volta\u2026"); }
        }
        if (videoStopRef.current) return { stop: true };
        if (!made) return { failedLabel: items[i].label || ("Ambiente " + (i + 1)) };
        made.key = items[i].key || null;
        try { await cloudSaveVideo(made.url, made.kind || "after", made.label, made.room_id, { move_score: made.move, fidelity_score: made.fid, samples: VIDEO_N_SAMPLES }); } catch (_) {}
        return { clip: made };
      }
      let interrotto = false;
      for (let start = 0; start < items.length && !interrotto; start += VIDEO_BATCH) {
        if (videoStopRef.current) { interrotto = true; break; }
        const idxs = [];
        for (let j = start; j < Math.min(start + VIDEO_BATCH, items.length); j++) idxs.push(j);
        setVideoProg({ done: done.length, total: items.length, name: items[idxs[0]].label || "" });
        const results = await mapStaggered(idxs, 400, function (i) { return processRoom(i); });
        for (let r = 0; r < results.length; r++) {
          const res = results[r] || {};
          if (res.stop) { interrotto = true; continue; }
          if (res.failedLabel) {
            push("\u26A0 " + res.failedLabel + ": saltato (nessuna versione riuscita). Vado avanti.");
            failed.push(res.failedLabel);
            continue;
          }
          if (res.clip) {
            if (res.reused) push("\u21BB " + (res.clip.label || "Foto") + ": riuso la clip gi\u00E0 pronta (nessun costo).");
            done.push(res.clip);
            setVideoClips(done.slice());
            saveVideoJob({ ts: Date.now(), items: meta, done: done, merged: null });
          }
        }
        if (interrotto || videoStopRef.current) { push("\u23F9 Interrotto. Le clip gi\u00E0 pronte restano salvate; ripremi \u00ABCrea video\u00BB per riprendere da dove eri."); interrotto = true; break; }
      }
      setVideoProg({ done: items.length, total: items.length, name: "" });
      let doneMsg = "\u2014 Fatto: " + done.length + (done.length === 1 ? " clip pronta." : " clip pronte.");
      if (failed.length) doneMsg += " Saltati: " + failed.join(", ") + ". Ripremi \u00ABCrea video\u00BB per ritentare solo quelli (le clip gi\u00E0 pronte non si ripagano).";
      else if (done.length >= 2) doneMsg += " Ora puoi unirle in un video unico con musica.";
      push(doneMsg);
    } catch (e) {
      setVideoErr(e && e.message ? e.message : String(e));
    } finally {
      setVideoBusy(false);
      setVideoStopReq(false);
    }
  }
