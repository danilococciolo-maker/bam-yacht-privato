<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>BAM Yacht — AI Refit Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Crimson Text',Georgia,serif;background:#1a2540;color:#e8dcc8;min-height:100vh}
.pill{background:transparent;border:1px solid rgba(201,168,76,.18);color:rgba(232,220,200,.5);padding:7px 18px;font-family:'Crimson Text',serif;font-size:14px;letter-spacing:.05em;cursor:pointer;border-radius:2px;transition:all .25s}
.pill:hover{border-color:rgba(201,168,76,.45);color:rgba(201,168,76,.85)}
.pill.on{background:rgba(201,168,76,.1);border-color:#c9a84c;color:#c9a84c}
.dz{border:1px dashed rgba(201,168,76,.22);border-radius:3px;padding:56px 32px;text-align:center;cursor:pointer;transition:all .3s;background:rgba(255,255,255,.012)}
.dz:hover,.dz.ov{border-color:rgba(201,168,76,.55);background:rgba(201,168,76,.035)}
.gbtn{background:linear-gradient(135deg,#c9a84c,#a8843a);color:#060a14;border:none;padding:15px 56px;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .3s}
.gbtn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 40px rgba(201,168,76,.32);filter:brightness(1.08)}
.gbtn:disabled{opacity:.35;cursor:not-allowed}
.pbtn{background:transparent;border:1px solid #c9a84c;color:#c9a84c;padding:10px 26px;font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .25s;font-weight:600}
.pbtn:hover:not(:disabled){background:rgba(201,168,76,.1)}
.pbtn:disabled{opacity:.4;cursor:not-allowed}
.olink{display:inline-flex;align-items:center;border:1px solid rgba(201,168,76,.28);color:rgba(201,168,76,.78);padding:10px 26px;font-size:13px;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;border-radius:2px;transition:all .25s}
.olink:hover{background:rgba(201,168,76,.07);border-color:#c9a84c;color:#c9a84c}
.sbtn{background:transparent;border:1px solid rgba(201,168,76,.13);color:rgba(232,220,200,.32);padding:10px 26px;font-size:13px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:color .25s}
.sbtn:hover{color:rgba(232,220,200,.58)}
@keyframes glow{0%,100%{opacity:.62}50%{opacity:1;text-shadow:0 0 22px rgba(201,168,76,.55)}}
.ltxt{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:#c9a84c;letter-spacing:.08em;animation:glow 2.5s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{width:44px;height:44px;border:1.5px solid rgba(201,168,76,.1);border-top-color:#c9a84c;border-right-color:rgba(201,168,76,.4);border-radius:50%;animation:spin 1.1s linear infinite;margin:0 auto}
@keyframes fu{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.rv{animation:fu .65s ease forwards}
.div{height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.1),transparent);margin:38px 0}
.sn{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.28em;color:rgba(201,168,76,.4);text-transform:uppercase;margin-bottom:3px}
.sl{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.18em;color:rgba(201,168,76,.82);text-transform:uppercase;margin-bottom:14px}
.gear{position:absolute;left:20px;top:50%;transform:translateY(-50%);background:transparent;border:1px solid rgba(201,168,76,.18);color:rgba(201,168,76,.6);width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .25s}
.gear:hover{border-color:#c9a84c;color:#c9a84c}
.gear.ok{border-color:rgba(80,200,120,.5);color:rgba(80,200,120,.85)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;animation:fu .25s}
.modal{background:linear-gradient(180deg,#1c2c4a,#1a2540);border:1px solid rgba(201,168,76,.18);border-radius:4px;max-width:500px;width:100%;padding:36px}
.inp{width:100%;background:rgba(0,0,0,.35);border:1px solid rgba(201,168,76,.18);color:#e8dcc8;padding:11px 14px;font-family:'Crimson Text',serif;font-size:14px;border-radius:2px;letter-spacing:.02em}
.inp:focus{outline:none;border-color:#c9a84c}
header{border-bottom:1px solid rgba(201,168,76,.09);padding:16px 20px;display:flex;align-items:center;justify-content:center;background:rgba(26,37,64,.93);backdrop-filter:blur(18px);position:sticky;top:0;z-index:200}
header img{height:90px;width:auto;object-fit:contain;display:block}
@media (max-width:600px){header img{height:45px}header{padding:12px 14px}.badge{font-size:9px;padding:2px 8px;right:12px;letter-spacing:.18em}main{padding:32px 16px 60px}}
.badge{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-family:'Cormorant Garamond',serif;font-size:10px;color:rgba(201,168,76,.3);letter-spacing:.28em;text-transform:uppercase;border:1px solid rgba(201,168,76,.12);padding:3px 12px;border-radius:2px}
main{max-width:840px;margin:0 auto;padding:48px 20px 80px;background:radial-gradient(ellipse 110% 55% at 50% 0%,rgba(201,168,76,.1) 0%,transparent 60%),linear-gradient(180deg,#1a2540,#202d4a)}
footer{border-top:1px solid rgba(201,168,76,.07);padding:24px 20px;text-align:center;font-size:10px;color:rgba(232,220,200,.12);letter-spacing:.2em;text-transform:uppercase;font-family:'Cormorant Garamond',serif}
100%{opacity:1;transform:scale(1)}}</style>
</head>

const MODEL_ENDPOINT = "/v1/models/black-forest-labs/flux-kontext-max/predictions";
const UPSCALE_ENDPOINT = "/v1/models/topazlabs/image-upscale/predictions";
const STEPS = ["Caricamento immagine\u2026", "Refit con Flux Kontext Max (preserva architettura)\u2026", "Upscaling 8K con Topaz High Fidelity\u2026"];
const LOGO_SRC = window.__LOGO__;

function BAMYachtApp() {
  const [img, setImg] = useState(null);
  const [result, setResult] = useState(null);
  const [resultB64, setResultB64] = useState(null);
  const [style, setStyle] = useState(STYLES[0]);
  const [busy, setBusy] = useState(false);
  const [step, setStep] = useState(0);
  const [err, setErr] = useState(null);
  const [pos, setPos] = useState(50);
  const [drag, setDrag] = useState(false);
  const [pdfBusy, setPdfBusy] = useState(false);
  const [token, setToken] = useState("");
  const [showSettings, setShowSettings] = useState(false);
  const [tokenInput, setTokenInput] = useState("");
  const [imgAspect, setImgAspect] = useState("16/9");
  const [compareMode, setCompareMode] = useState(false);
  const [yacht, setYacht] = useState({ cantiere: "", modello: "", anno: "", oreMotore: "", manutenzione: "" });
  const updateYacht = (k, v) => setYacht(prev => Object.assign({}, prev, { [k]: v }));
  const fileRef = useRef();
  const sliderRef = useRef();
  const timer = useRef(null);

  useEffect(() => {
    try {
      const t = localStorage.getItem("bam_replicate_token");
      if (t) { setToken(t); setTokenInput(t); }
    } catch (_) {}
  }, []);

  const saveToken = () => {
    const t = (tokenInput || "").trim() || token;
    if (!t) { setErr("Inserisci il token Replicate"); return; }
    setToken(t);
    setShowSettings(false);
    setErr(null);
    try { localStorage.setItem("bam_replicate_token", t); } catch (_) {}
  };

  const clearToken = () => {
    setToken("");
    setTokenInput("");
    try { localStorage.removeItem("bam_replicate_token"); } catch (_) {}
  };

  const loadFile = useCallback((file) => {
    if (!file || !file.type || !file.type.startsWith("image/")) return;
    const r = new FileReader();
    r.onload = (e) => {
      const dataUrl = e.target.result;
      // Preprocess: load in canvas, resize if too big, convert to RGB JPEG
      const tmpImg = new Image();
      tmpImg.onload = () => {
        try {
          // Resize max 2048 in qualsiasi dim (Kontext Max accetta qualsiasi aspect ratio)
          const maxDim = 2048;
          let w = tmpImg.width, h = tmpImg.height;
          if (w > maxDim || h > maxDim) {
            const ratio = maxDim / Math.max(w, h);
            w = Math.round(w * ratio);
            h = Math.round(h * ratio);
          }
          const canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, w, h);
          ctx.drawImage(tmpImg, 0, 0, w, h);
          const clean = canvas.toDataURL("image/jpeg", 0.95);
          setImg(clean);
          setImgAspect(w + "/" + h);
        } catch (_) {
          setImg(dataUrl);
        }
        setResult(null);
        setResultB64(null);
        setErr(null);
      };
      tmpImg.onerror = () => {
        setImg(dataUrl);
        setResult(null);
        setResultB64(null);
        setErr(null);
      };
      tmpImg.src = dataUrl;
    };
    r.readAsDataURL(file);
  }, []);

  const urlToDataUri = async (url) => {
    const res = await fetch(url);
    const blob = await res.blob();
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(blob);
    });
  };

  // Croppa il render finale per matchare esattamente l'aspect ratio del prima
  const matchAspect = async (renderUrl, refDataUri) => {
    return new Promise((resolve) => {
      const refImg = new Image();
      refImg.onload = () => {
        const outImg = new Image();
        outImg.crossOrigin = "anonymous";
        outImg.onload = () => {
          try {
            const refRatio = refImg.width / refImg.height;
            const srcRatio = outImg.width / outImg.height;
            // Se aspect ratio già combaciano (tolleranza 2%), nessun crop
            if (Math.abs(refRatio - srcRatio) < 0.02) {
              resolve(renderUrl);
              return;
            }
            let cropW, cropH, cropX, cropY;
            if (srcRatio > refRatio) {
              cropH = outImg.height;
              cropW = outImg.height * refRatio;
              cropX = (outImg.width - cropW) / 2;
              cropY = 0;
            } else {
              cropW = outImg.width;
              cropH = outImg.width / refRatio;
              cropX = 0;
              cropY = (outImg.height - cropH) / 2;
            }
            const canvas = document.createElement("canvas");
            canvas.width = Math.round(cropW);
            canvas.height = Math.round(cropH);
            const ctx = canvas.getContext("2d");
            ctx.drawImage(outImg, cropX, cropY, cropW, cropH, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL("image/jpeg", 0.95));
          } catch (_) {
            resolve(renderUrl);
          }
        };
        outImg.onerror = () => resolve(renderUrl);
        outImg.src = renderUrl;
      };
      refImg.onerror = () => resolve(renderUrl);
      refImg.src = refDataUri;
    });
  };

  const generate = async () => {
    if (!img || busy) return;
    if (!token) { setShowSettings(true); return; }

    setBusy(true); setResult(null); setResultB64(null); setErr(null); setStep(0);

    try {
      let sceneDescription = "";

      // Compongo prompt finale: prima la descrizione architettonica (vincolo critico), poi lo stile
      const promptText = style.prompt;

      // STEP 2: Flux Canny Pro \u2014 edge detection + style transfer
      setStep(1);
      const startRes = await fetch(MODEL_ENDPOINT, {
        method: "POST",
        headers: { "Authorization": "Token " + token, "Content-Type": "application/json" },
        body: JSON.stringify({
          input: {
            prompt: promptText,
            input_image: img,
            aspect_ratio: "match_input_image",
            output_format: "jpg",
            safety_tolerance: 6,
          }
        })
      });

      if (startRes.status === 401) throw new Error("Token Replicate non valido. Verificalo in Impostazioni.");
      if (startRes.status === 402) throw new Error("Credito Replicate esaurito.");
      if (startRes.status === 429) throw new Error("Troppe richieste. Attendi qualche secondo.");
      if (!startRes.ok) {
        const txt = await startRes.text();
        throw new Error("Errore Replicate " + startRes.status + ": " + txt.slice(0, 200));
      }

      let prediction = await startRes.json();
      let attempts = 0;
      setStep(2);
      while ((prediction.status === "starting" || prediction.status === "processing") && attempts < 90) {
